name: Build and Deploy to EasyPanel

on:
  push:
    branches:
      - master

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Built on GitHub's own runners (multiple cores, ample RAM) rather than
      # on the EasyPanel VPS itself, which is severely resource-constrained
      # (single CPU core, ~2GB RAM, shared with Audiobookshelf and Postgres)
      # -- that VPS previously took 450-490s per npm ci step (vs. 15-20s on a
      # normal machine) and once crashed BuildKit outright mid-build. The
      # EasyPanel app should be configured to deploy from this pre-built
      # image (ghcr.io/mdagley/book-catalog:latest) rather than building
      # from the Dockerfile itself.
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/mdagley/book-catalog:latest
            ghcr.io/mdagley/book-catalog:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    concurrency:
      group: easypanel-deploy
    steps:
      - name: Trigger EasyPanel deploy
        run: curl -fsS --max-time 30 -X POST "${{ secrets.EASYPANEL_DEPLOY_URL }}"
